syntax = "proto3";

package auth;
option java_package = "a8.hermes.proto.auth";
option java_multiple_files = true;

import "google/protobuf/timestamp.proto";

option go_package = "accur8.io/godev/pkg/rpc/auth";

// LoginBeginRequest initiates SSH-based authentication flow
message LoginBeginRequest {
  string ssh_public_key = 1;            // OpenSSH format public key
  string origin = 2;                     // user@host from CLI
  string vpn_ip = 3;                     // Optional VPN IP (172.24/172.25)
  bool extend_existing_auth = 4;         // If true, extend existing token instead of creating new
  string requested_token_duration = 5;   // Optional: requested token duration (e.g., "2m", "15m", "1h")
}

// LoginBeginResponse contains challenge for SSH signature
message LoginBeginResponse {
  string session_id = 1;  // UUID for this login session
  bytes nonce = 2;        // 32 random bytes to sign
  bool no_token_to_extend = 3;  // True if extend_existing_auth was requested but token was cleared/missing
  string no_token_reason = 4;   // Human-readable reason why token cannot be extended (e.g., "token was cleared", "never authenticated")
}

// LoginCompleteRequest submits SSH signature proof
message LoginCompleteRequest {
  string session_id = 1;     // Session ID from BeginLogin
  string ssh_public_key = 2; // Same public key as BeginLogin
  bytes signature = 3;       // SSH signature over nonce
}

// LoginCompleteResponse returns auth token on successful verification
message LoginCompleteResponse {
  string auth_token = 1;                      // Signed token for subsequent requests
  google.protobuf.Timestamp expires_at = 2;   // When the token expires
}

// HasRoleRequest checks if user has one or more roles
message HasRoleRequest {
  string mailbox_address = 1;    // Mailbox address of requestor
  bytes role = 2;                // DEPRECATED - single role as JSON (for v1 compatibility)
  repeated string roles = 3;     // List of roles to check (endpoint paths or database roles)
}

// HasRoleResponse indicates whether user has any of the requested roles
message HasRoleResponse {
  bool allowed = 1;                  // Whether user has at least one of the roles
  string reason = 2;                 // Optional explanation
  repeated string roles_matched = 3; // Which roles the user has (from the requested list)
}

// GetUserInfoRequest looks up user details by auth token
message GetUserInfoRequest {
  string auth_token = 1;  // Auth token from login
}

// UserGroupInfo contains information about a group membership
message UserGroupInfo {
  string uid = 1;           // Group UID
  string name = 2;          // Group name
  string description = 3;   // Group description
}

// GetUserInfoResponse returns user information
message GetUserInfoResponse {
  string user_uid = 1;                        // User UID
  string name = 2;                            // User name
  string email = 3;                           // User email (may be empty)
  string description = 4;                     // User description
  repeated UserGroupInfo groups = 5;          // Direct group memberships
  string external_maintainer = 6;             // External maintainer (may be empty)
  bytes extra_config = 7;                     // Extra config as JSON
  google.protobuf.Timestamp expires_at = 8;   // When the auth token expires
  string expires_extension = 9;               // Extension duration (e.g., "1 hour")
}

// GetUserInfoByMailboxRequest looks up user details by mailbox address
// Requires: mailbox.info role (auto-granted for now)
message GetUserInfoByMailboxRequest {
  string mailbox_address = 1;  // Mailbox address to look up
}

// GetUserInfoByMailboxResponse returns user information
message GetUserInfoByMailboxResponse {
  string user_uid = 1;              // User UID
  string name = 2;                  // User name
  string email = 3;                 // User email (may be empty)
  string description = 4;           // User description
  repeated UserGroupInfo groups = 5; // Direct group memberships
  string external_maintainer = 6;   // External maintainer (may be empty)
  bytes extra_config = 7;           // Extra config as JSON
}

// GetUserInfoForSelfRequest requests authenticated user's own information
// No parameters needed - uses caller's identity from RpcContext
message GetUserInfoForSelfRequest {
  // Empty - identity comes from auth token in RpcContext
}

// GetUserInfoForSelfResponse returns authenticated user's information.
// The worker_* and server_* fields are populated only when the caller's
// usergroup is bound to a worker row (worker rows); they
// are empty for plain user logins.
message GetUserInfoForSelfResponse {
  string user_uid = 1;                        // User UID
  string name = 2;                            // User name
  string email = 3;                           // User email (may be empty)
  string description = 4;                     // User description
  repeated UserGroupInfo groups = 5;          // Direct group memberships
  string external_maintainer = 6;             // External maintainer (may be empty)
  bytes extra_config = 7;                     // Extra config as JSON
  google.protobuf.Timestamp expires_at = 8;   // When the auth token expires
  string expires_extension = 9;               // Extension duration (e.g., "1 hour")
  string worker_uid = 10;                    // worker.uid (empty for plain user logins)
  string worker_label = 11;                  // "<login>@<server.name>" (empty for plain user logins)
  string server_uid = 12;                     // server.uid bound to the worker (empty for plain user logins)
  string server_label = 13;                   // server.name (empty for plain user logins)
}

// ManageRoleOverrideRequest grants or denies a role for a user
message ManageRoleOverrideRequest {
  string user_identifier = 1;  // Email address or user UID
  string role = 2;              // Role name (e.g., "ContinuumUser")
  bool granted = 3;             // true = grant, false = deny
  string reason = 4;            // Reason for override
  string duration = 5;          // Optional: Go duration string (e.g., "24h", "168h")
}

// ManageRoleOverrideResponse confirms role override was created/updated
message ManageRoleOverrideResponse {
  bool success = 1;            // Whether operation succeeded
  string message = 2;          // Human-readable message
  string user_uid = 3;         // UID of the user affected
  string user_label = 4;       // Display label (email or name)
  string expires_at = 5;       // ISO 8601 timestamp if duration was set
}

// ImpersonateUserRequest asks (as a ContinuumAdmin) for a session token that
// authenticates AS another user, so an admin can view the app from that user's
// perspective. The minted auth row links back (delegateauthuid) to the admin's
// own auth row it was created from — the record shows "X impersonating Y".
message ImpersonateUserRequest {
  string target_user_uid = 1;  // usergroup.uid of the user to impersonate
  string reason = 2;           // optional audit reason
}

// ImpersonateUserResponse returns a session token bound to the target user.
message ImpersonateUserResponse {
  string session_token = 1;            // token authenticating AS the target user
  string target_user_uid = 2;          // the impersonated user's uid (Y)
  string target_name = 3;              // the impersonated user's name
  string target_email = 4;             // the impersonated user's email (may be empty)
  repeated UserGroupInfo target_groups = 5;  // the impersonated user's groups
  string impersonator_uid = 6;         // the admin who minted this (X)
  string impersonator_name = 7;        // the admin's name (for the "viewing as" banner)
  string expires_at = 8;               // ISO 8601 token expiry
}

// RemoveRoleOverrideRequest deletes a role override
message RemoveRoleOverrideRequest {
  string user_identifier = 1;  // Email address or user UID
  string role = 2;              // Role name to remove
}

// RemoveRoleOverrideResponse confirms removal
message RemoveRoleOverrideResponse {
  bool success = 1;     // Whether operation succeeded
  string message = 2;   // Human-readable message
  string user_uid = 3;  // UID of the user affected
}

// EndpointAuthInfo contains information about a single endpoint_auth record
message EndpointAuthInfo {
  string uid = 1;
  string usergroup_uid = 2;      // Group UID (null for defaults)
  string usergroup_name = 3;     // Group name
  string usergroup_email = 4;    // Group email
  string endpoint_pattern = 5;
  bool granted = 6;
  int32 priority = 7;
  string reason = 8;
  string created_at = 9;
  string created_by = 10;
  string expires_at = 11;
  string updated_at = 12;        // Last update timestamp
  string updated_by = 13;        // Who last updated this grant
  string external_maintainer = 14; // Policy name (if managed by a policy)
  string policy_uid = 15;        // Policy UID (if managed by a policy)
  bytes extradata = 16;          // Additional metadata as JSON
}

// TestEndpointAccessRequest tests authorization for a user+endpoint
message TestEndpointAccessRequest {
  string user_identifier = 1;      // Email address or user UID
  string endpoint_pattern = 2;     // Endpoint pattern to test (e.g., "auth.v2.GetUserInfo")
  bool include_all_policies = 3;   // Include all evaluated policies (not just matched ones)
}

// PolicyMatchInfo contains details about a policy evaluation
message PolicyMatchInfo {
  EndpointAuthInfo policy = 1;     // The policy record
  bool matched = 2;                // Whether this policy matched the endpoint
  int32 specificity = 3;           // Pattern match specificity score
  bool selected = 4;               // Whether this was the winning policy
}

// TestEndpointAccessResponse returns authorization test results
message TestEndpointAccessResponse {
  bool allowed = 1;                         // Whether access is allowed
  string reason = 2;                        // Explanation of the decision
  string user_uid = 3;                      // Resolved user UID
  string user_email = 4;                    // User email
  string user_name = 5;                     // User display name
  repeated string user_group_names = 6;     // User's group names (for display)
  repeated string user_group_uids = 7;      // User's group UIDs (for filtering)
  PolicyMatchInfo winning_policy = 8;       // The policy that made the final decision
  repeated PolicyMatchInfo matched_policies = 9;   // All policies that matched
  repeated PolicyMatchInfo evaluated_policies = 10; // All evaluated policies (if requested)
  bool no_policy_matched = 11;              // True if no policy matched (fallback to deny)
}

// Auth service provides authentication and authorization
service Auth {
  rpc LoginBegin(LoginBeginRequest) returns (LoginBeginResponse);
  rpc LoginComplete(LoginCompleteRequest) returns (LoginCompleteResponse);
  rpc HasRole(HasRoleRequest) returns (HasRoleResponse);
  rpc GetUserInfo(GetUserInfoRequest) returns (GetUserInfoResponse);
  rpc GetUserInfoByMailbox(GetUserInfoByMailboxRequest) returns (GetUserInfoByMailboxResponse);
  rpc GetUserInfoForSelf(GetUserInfoForSelfRequest) returns (GetUserInfoForSelfResponse);
  rpc ManageRoleOverride(ManageRoleOverrideRequest) returns (ManageRoleOverrideResponse);
  rpc RemoveRoleOverride(RemoveRoleOverrideRequest) returns (RemoveRoleOverrideResponse);
  rpc ImpersonateUser(ImpersonateUserRequest) returns (ImpersonateUserResponse);
  // ListRoleOverrides and ListAllEndpointAuth: types exist in auth.pb.go
  // but were never written into this .proto. Drift to clean up separately;
  // commenting out here lets the rest of the file regenerate.
  // rpc ListRoleOverrides(ListRoleOverridesRequest) returns (ListRoleOverridesResponse);
  // rpc ListAllEndpointAuth(ListAllEndpointAuthRequest) returns (ListAllEndpointAuthResponse);
  rpc TestEndpointAccess(TestEndpointAccessRequest) returns (TestEndpointAccessResponse);
  rpc UpsertPolicy(UpsertPolicyRequest) returns (UpsertPolicyResponse);
  rpc ListPolicies(ListPoliciesRequest) returns (ListPoliciesResponse);
  rpc ApplyPolicy(ApplyPolicyRequest) returns (ApplyPolicyResponse);
}

// SyncPoliciesRequest contains policy and group definitions to sync
message SyncPoliciesRequest {
  bool dry_run = 1;          // Preview changes without applying
  bool verify_only = 2;      // Check for drift only
  string policies_json = 3;  // JSON-serialized policy definitions
  string groups_json = 4;    // JSON-serialized group definitions
}

// SyncPoliciesResponse returns results of policy sync operation
message SyncPoliciesResponse {
  bool success = 1;
  string message = 2;
  int32 groups_added = 3;
  int32 groups_updated = 4;
  int32 policies_added = 5;
  int32 policies_updated = 6;
  int32 policies_deleted = 7;
  repeated string errors = 8;  // Error messages if any
}

// PolicyDefinition represents a single authorization policy
message PolicyDefinition {
  string usergroup_name = 1;     // Empty for default policies, else group name (natural key - resolved to UID at sync time)
  string endpoint_pattern = 2;   // RPC endpoint pattern (e.g., "auth.v2.LoginBegin", "runner.v2.*")
  bool granted = 3;              // true = allow, false = deny
  int32 priority = 4;            // Higher priority wins conflicts
  string reason = 5;             // Human-readable explanation
  map<string, string> extra_data = 6;  // Optional metadata (use string values for JSON compatibility)
}

// GroupDefinition represents a user group
message GroupDefinition {
  string name = 1;         // Human-readable name (e.g., "ContinuumUser") - natural key, UID resolved at sync time
  string description = 2;  // Group purpose/description
}

// TableAccessRule represents a table-level access control rule
message TableAccessRule {
  string usergroup_name = 1;           // Group name (resolved to UID at sync time), empty = default
  string table_name = 2;              // Virtual table name from table_metadata
  repeated string access_modes = 3;   // e.g., ["select-sql","fetch-data","insert-data"]
  bool granted = 4;                   // true = allow, false = deny
  int32 priority = 5;                 // Higher priority wins conflicts
  string reason = 6;                  // Human-readable explanation
  string row_filter = 7;              // Optional SQL expr AND'd into SELECT/UPDATE; supports queryvar.useruid placeholder
  bool terminal = 8;                  // When this matching GRANT is reached (highest priority first), stop composing lower-priority grant filters (soft-delete still composes)
}

// Policy represents a complete policy with groups and grants
message Policy {
  string name = 1;                         // Policy name (e.g., "godev", "acme-corp")
  string version = 2;                      // Semantic version or generation ID
  string description = 3;                  // Policy description
  repeated GroupDefinition groups = 4;     // Groups to create/update
  repeated PolicyDefinition policies = 5;  // Policies to sync
  map<string, string> metadata = 6;        // Additional metadata
  repeated TableAccessRule table_access = 7; // Table-level access rules to sync
}

// PolicyInfo is the database-stored representation
message PolicyInfo {
  string uid = 1;              // Primary key
  string name = 2;             // Policy name (used as external_maintainer)
  Policy policy = 3;           // The actual policy
  string created_at = 4;       // ISO-8601 timestamp
  string created_by = 5;       // Creator identifier
  string updated_at = 6;       // ISO-8601 timestamp
  string updated_by = 7;       // Updater identifier
  bool active = 8;             // Whether this policy is active
}

// UpsertPolicyRequest stores a policy definition
message UpsertPolicyRequest {
  Policy policy = 1;           // The policy to store
  string created_by = 2;       // Who is creating/updating this
}

// UpsertPolicyResponse confirms storage
message UpsertPolicyResponse {
  bool success = 1;
  string message = 2;
  string policy_uid = 3;       // UID of stored policy
}

// ListPoliciesRequest lists stored policies
message ListPoliciesRequest {
  bool active_only = 1;        // Filter to only active policies
}

// ListPoliciesResponse returns stored policies
message ListPoliciesResponse {
  repeated PolicyInfo policies = 1;
}

// ApplyPolicyRequest applies a stored policy
message ApplyPolicyRequest {
  string policy_name = 1;      // Name of policy to apply
  bool dry_run = 2;            // Preview without applying
  // Policy to evaluate, as JSON. When set, the server uses this instead of
  // reading the stored row -- so a dry run never has to stage the policy in
  // the database first. Empty = read the stored policy named policy_name.
  string policy_json = 3;
}

// ApplyPolicyResponse returns results of applying a policy
message ApplyPolicyResponse {
  bool success = 1;
  string message = 2;
  int32 groups_added = 3;
  int32 groups_updated = 4;
  int32 policies_added = 5;
  int32 policies_updated = 6;
  int32 policies_deleted = 7;
  repeated string errors = 8;
  // table_access counts: computed all along, never reported.
  int32 table_access_added = 9;
  int32 table_access_updated = 10;
  int32 table_access_deleted = 11;
  // Human-readable drift lines ("Would add group: X"). The server computed these
  // and logged them locally, so a dry run's whole report died in the auth
  // service's log and the operator saw an empty, exit-0 run.
  repeated string drift = 12;
}
