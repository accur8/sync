syntax = "proto3";

package fileset;
option java_package = "a8.hermes.proto.fileset";
option java_multiple_files = true;
option go_package = "accur8.io/godev/pkg/rpc/fileset";

// ============================================================================
// Fileset Management
// ============================================================================

message CreateFilesetRequest {
  string name = 1;
  string description = 2;
}

message CreateFilesetResponse {
  string fileset_uid = 1;
  string error_message = 2;
}

// ============================================================================
// Pull
// ============================================================================

message PullRequest {
  string fileset_name = 1;
}

message PullResponse {
  string fileset_uid = 1;
  string fileset_name = 2;
  string revision_uid = 3;
  repeated FileEntry entries = 4;
  string error_message = 5;
}

// ============================================================================
// Pull Revision (by specific revision UID)
// ============================================================================

message PullRevisionRequest {
  string fileset_uid = 1;
  string revision_uid = 2;
}

message PullRevisionResponse {
  string fileset_uid = 1;
  string fileset_name = 2;
  string revision_uid = 3;
  repeated FileEntry entries = 4;
  string error_message = 5;
}

// ============================================================================
// Push
// ============================================================================

message PushRequest {
  string fileset_uid = 1;
  string expected_revision_uid = 2;
  repeated FileEntry entries = 3;
  string message = 4;
}

message PushResponse {
  string new_revision_uid = 1;
  bool success = 2;
  bool conflict = 3;
  string error_message = 4;
}

// ============================================================================
// Listing
// ============================================================================

message ListFilesetsRequest {}

message ListFilesetsResponse {
  repeated FilesetInfo filesets = 1;
}

// ============================================================================
// Access Control
// ============================================================================

message GrantAccessRequest {
  string fileset_uid = 1;
  string usergroup_uid = 2;
  string perms = 3;
}

message GrantAccessResponse {
  bool success = 1;
  string error_message = 2;
}

message ListAccessRequest {
  string fileset_uid = 1;
}

message ListAccessResponse {
  repeated AccessEntry entries = 1;
}

// ============================================================================
// Shared Types
// ============================================================================

message FileEntry {
  string path = 1;
  string sha256 = 2;
  int64 size = 3;
  bytes content = 4;
}

message FilesetInfo {
  string uid = 1;
  string name = 2;
  string description = 3;
  string current_revision = 4;
}

message AccessEntry {
  string uid = 1;
  string usergroup_uid = 2;
  string perms = 3;
}
