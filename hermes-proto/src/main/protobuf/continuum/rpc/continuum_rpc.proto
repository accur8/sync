syntax = "proto3";

import "google/protobuf/timestamp.proto";
import "pkg/discovery/discovery.proto";

package continuum_rpc;
option java_package = "a8.hermes.proto.continuum";
option java_multiple_files = true;
option go_package = "accur8.io/godev/continuum/rpc";

message ProcessStartedRequest {
  string                        processUid          = 1;
  string                        parentProcessRunUid = 2;
	int32                         processPid          = 3;
  string                        workerUid           = 4;
  string                        jobUid              = 5;  // the job this run belongs to (renamed from serviceUid; field number 5 unchanged for wire compat)
  google.protobuf.Timestamp     startedAt           = 6;  // UTC timestamp
	repeated string               command             = 7;
	string                        cwd                 = 8;
	repeated string               env                 = 9;
	string                        category            = 10;
  repeated string               channels            = 11;
  bool                          controllable        = 12;
  string                        launchError         = 13;
  string                        kind                = 14;
  string                        extraDataJsonStr    = 15;
  string                        jobName             = 16;  // the job name this run announces (renamed from serviceName; field number 16 unchanged for wire compat)
  string                        ephemeralName       = 17;
  string                        eventUid            = 18;  // Scheduler event UID for correlation

  // Embedded discovery information (eliminates need for separate RPC query)
  discovery.DiscoveryResponse   discovery           = 19;

  // is_update marks this message as a refresh of an already-known process
  // rather than a first arrival. The consumer overwrites the mutable
  // snapshot fields (rpc schema list, mailbox address, location, engines,
  // metadata) but leaves immutable identity fields (started_at, command,
  // cwd, kind, …) on the existing processrun row untouched. If no
  // existing row is found the consumer falls through to first-arrival
  // behavior so the message is self-healing.
  bool                          isUpdate            = 20;

  // Self-detected process manager (FEATURE-20260714-self-detect-process-manager):
  // the process reports, about ITSELF, who supervises it and under what name.
  // processManagerUnit is the CONTROL HANDLE — the systemd unit
  // ("a8-jobrun-<id>.service") or supervisord program ("group:program") you pass
  // to that manager to start/stop/restart it. So a job's unit is resolvable from
  // its processrun with no `a8 svc import`. Also carried in discovery.metadata
  // (process_manager*) for map-based consumers; these are the first-class form.
  // All empty when unmanaged (bare CLI / non-systemd) — normal, not an error.
  string                        processManager      = 21;  // "systemd" | "supervisord" | ""
  string                        processManagerUnit  = 22;  // unit / program name (the control handle)
  string                        processManagerScope = 23;  // "system" | "user" (systemd only)
}

// UpdateMailboxRequest (the processrun→mailbox REVERSE link) is RETIRED — the runner
// stopped sending it, and the forward link (mailbox.process_run_uid, set at creation via
// CreateMailboxRequest.processRunUid; the mailbox address carried on DiscoveryResponse at
// ProcessStart) replaced it. Removed 2026-07-15 (TASK-20260715-deprecate-updatemailboxrequest).
// Field 5 + name updateMailboxRequest are reserved below so the tag is never reused.

message ProcessPingRequest {
  repeated ProcessPing          pings      = 1;
  google.protobuf.Timestamp     timestamp  = 2;  // UTC timestamp
}

message ProcessPing {
  string               processUid    = 1;
  map<string, uint64>  channelSizes  = 2;
  // status reports liveness state: "" / "running" = actively working,
  // "paused" = alive but yielded/checkpointed (e.g. a paused checkpoint program).
  // A paused process keeps pinging so it is NOT AWOL-swept, but is not "running".
  string               status        = 3;
}

message ProcessCompletedRequest {
  string                        processUid     = 1;
  int32                         exitCode       = 2;
  string                        exitMessage    = 3;
  google.protobuf.Timestamp     completedAt    = 4;  // UTC timestamp
  // Scheduler event UID for correlation (mirrors ProcessStartedRequest.eventUid).
  // Carried on completion so the registry can resolve the lifecycle bundle's
  // schedule/event DIRECTLY instead of looking up the jobevent by process_run_uid —
  // which races for a REMOTE worker (the leaf's completion can reach the registry
  // before continuum commits the jobevent.process_run_uid link, yielding an empty
  // schedule/event on run.completed and breaking checker correlation).
  string                        eventUid       = 5;
}

// MetricsPushed announces that a LIVE metrics pusher (a resident collector, e.g.
// `a8 worker capture-metrics --interval ...`) committed one fresh metrics row for
// its processrun. The pusher sends this only AFTER its insert RPC succeeded (the
// same publish-after-commit race barrier the lifecycle contract requires), so the
// registry can assemble a self-contained metrics.pushed lifecycle event from the
// latest committed row. A resident pusher never completes, so this — not
// ProcessCompleted — is its per-capture checker trigger.
message MetricsPushedRequest {
  string                        processUid          = 1;
  string                        workerUid           = 2;
  string                        jobUid              = 3;
  // The capture's own occurrence time (epoch millis). Rides into the lifecycle
  // envelope's dedup key so distinct pushes from one process never dedup away.
  int64                         occurredAtEpochMs   = 4;
}

message Ack {
}

// ArchiveNow triggers ONE full log-archive pass on demand (the archiver runs it,
// single writer — no race with the scheduled loop). Used by the CLI purge to
// archive freshly-completed procs before a purge pass so they become eligible.
message ArchiveNowRequest {
}

message ArchiveNowResponse {
  int32  processesArchived = 1; // completed procs marked done this pass
}

message MessageFromRunner {
  // Field 5 (updateMailboxRequest) is RETIRED — the processrun→mailbox reverse link;
  // see TASK-20260715-deprecate-updatemailboxrequest. Reserved at the message level so the
  // tag and name are never reused. (reserved must sit on the message, not inside the oneof.)
  reserved 5;
  reserved "updateMailboxRequest";
  oneof message {
    ProcessStartedRequest     processStartedRequest      = 1;
    ProcessPingRequest        processPingRequest         = 2;
    ProcessCompletedRequest   processCompletedRequest    = 3;
    StreamWrite               streamWrite                = 4;
    PingRequest               pingRequest                = 6;
    MailboxPing               mailboxPing                = 7;
    StreamCreatedRequest      streamCreatedRequest       = 8;
    MetricsPushedRequest      metricsPushedRequest       = 9;
  }
}

// StreamCreatedRequest is a leaf's notification, sent the moment it creates a
// processrun channel stream (console/journal) in NATS, so the server writes the
// matching continuum.stream record. Active registration by design: we create a
// NATS stream, we create its record — no NATS-sweeping to reconcile. The leaf
// has no pg; the server (which holds the DB) is the sole writer of the stream
// ledger. stream_name/subject are derived server-side from processUid+channelName.
message StreamCreatedRequest {
  string  processUid   = 1;
  string  channelName  = 2;
  int32   replicas     = 3;  // R the leaf created the stream with (processrun logs = 1)
  string  placementTag = 4;  // the n1..nX tag the leaf placed the R=1 stream on ("" if unplaced / single-node); recorded on the stream record
}

// MailboxPing is a leaf mailbox's fire-and-forget aliveness signal. Leaves
// publish it on continuum.central instead of round-tripping the mailbox-records
// update endpoint with a full record — the server touches LastActivity
// through its store (cache-coherent, debounced server-side).
message MailboxPing {
  string adminKey = 1;
}

message StreamWrite {
  string           processUid   = 1;
  string           channelName  = 2;
  StreamRecord     record       = 3;
}

message StreamRecord {
  google.protobuf.Timestamp     timestamp    = 2;  // UTC timestamp
  uint64                        sequence     = 3;
  repeated Buffer               buffers      = 4;
  // writerEpoch identifies the writer INSTANCE (stamped once at construction).
  // sequence is contiguous only within one writer's life and resets to 1 for a
  // fresh writer (e.g. a job retry reusing the same processUid) — an epoch
  // change marks a reset legitimate; a sequence skip WITHIN an epoch is real
  // loss. Enables the gap detection that JetStream stream sequences cannot
  // provide (per-subject they are gappy by construction on shared streams).
  uint64                        writerEpoch   = 5;
  // eof marks the writer's terminal record: the writer closed cleanly and no
  // further records follow from this epoch. Emitted synchronously as the last
  // record on shutdown. Without this marker a dropped FINAL record is
  // undetectable — nothing follows it to reveal the skip.
  bool                          eof           = 6;
  // finalSequence (on eof records) is the last data-carrying sequence this
  // writer emitted: holding contiguous 1..finalSequence for the epoch == no
  // loss. The archiver can reconcile against this at run completion.
  uint64                        finalSequence = 7;
}

message Buffer {
  google.protobuf.Timestamp     timestamp  = 1;  // UTC timestamp
  bytes                         data       = 2;
  BufferSource                  source     = 3;
  // record is the STRUCTURED payload, carried by the applog channel (a process
  // logging its own log/log.go events). console/journal leave it unset and carry
  // opaque bytes in `data` — those are a byte stream with no level or caller to
  // capture, and wrapping them here would only mint permanently-empty fields.
  // Both payloads ride the same StreamRecord envelope, so ordering, epoch/EOF gap
  // detection, archiving, and reaping are one mechanism rather than two.
  LogRecord                     record     = 4;
}

enum BufferSource {
  unspecified         = 0;
  stderr              = 1;
  stdout              = 2;
  journalctl          = 3;
  windows_event_log   = 4;
  // applog: emitted from INSIDE the process by its own logger, as opposed to
  // captured from its stdout/stderr (stdout/stderr) or from the OS's view of it
  // (journalctl/windows_event_log). Same axis, one more source.
  applog              = 5;
}

// LogRecord is one structured log event from a process's own logger — the record
// log/log.go builds and then currently destroys by Sprintf'ing every field into a
// single string. Keeping it structured is what lets a reader filter by level or
// caller instead of substring-matching a rendered line.
message LogRecord {
  LogLevel                      level      = 1;
  string                        caller     = 2;  // "a8nats.go:816"
  uint64                        goid       = 3;  // goroutine id
  string                        message    = 4;  // the formatted message
  // extraData is the structured-logging bag: request_id, job_uid, mailbox, etc.
  // Fields the Sprintf-to-string format cannot express at all. Same shape as
  // registry ProcessInfo.ExtendedMetadata, which is the existing precedent.
  map<string, string>           extraData  = 5;
  // Reserved for an opaque binary payload if one is ever genuinely needed, so
  // adding it later is not a schema break.
  reserved 6;
  // rendered is the exact human line the process's own console showed. Sent
  // ALONGSIDE the structured fields during rollout so a reader that has not
  // learned LogRecord yet still prints something correct, and so a structured
  // viewer can fall back to the writer's own formatting. Once every reader
  // decodes the fields this can stop being populated — the structure is the
  // source of truth, this is the compatibility shim.
  string                        rendered   = 7;
  // droppedRecords, when > 0, is how many records the WRITER's spool had to drop
  // before this one (NATS unreachable long enough to overflow). Carried on the
  // wire so the loss is VISIBLE to a reader — a truncated log that admits what
  // it lost beats one that quietly shows a hole.
  uint64                        droppedRecords = 8;
  // error is the ERROR ITSELF, kept structured instead of flattened into message.
  // Unset on non-error records.
  //
  // Both languages already HAVE this and both currently throw it away at the last
  // moment — the same crime the level suffered. Go's log.ErrorE(err) takes a real
  // error (routinely a stacktrace.Propagate chain carrying file/line frames) and
  // immediately does err.Error(); the JVM attaches a Throwable that logback renders
  // to a stack trace. In both cases the most valuable payload in the whole record —
  // what broke and where — survives only as a substring.
  LogError                      error      = 9;
  // thread is the JVM's concurrent-context identity (the thread name: "main",
  // "nats-worker-3"). It is the JVM's answer to the same question `goid` answers
  // for Go, and the two are deliberately SEPARATE fields: a thread name is a
  // string and a goroutine id is a number, so each language fills its own and
  // neither has to fake or stringify the other's. Exactly one is populated.
  string                        thread     = 10;
}

// LogError is a logged error, with its chain intact. The `cause` link is what
// makes it worth being a message rather than a string: a wrapped error (Go's
// stacktrace.Propagate / fmt.Errorf %w, the JVM's getCause) is a CHAIN, and the
// root cause — the interesting one — is at the far end of it. Flattening it to
// text is what forces a human to read a wall of prose to find the bottom frame.
message LogError {
  // message is this link's own message (err.Error() / Throwable.getMessage()).
  string   message = 1;
  // type is the concrete error/exception type ("*net.OpError",
  // "java.io.IOException"). A FIELD, so "show me every IOException in the fleet"
  // is a filter rather than a substring guess.
  string   type    = 2;
  // stack is the rendered stack trace / propagation frames for this link.
  string   stack   = 3;
  // cause is the wrapped error, recursively. Nil at the root.
  LogError cause   = 4;
}

// LogLevel mirrors log/log.go's five levels. Deliberately NOT the LogLevel in
// pkg/rpc/process/process_rpc.proto: that one is unused, lacks trace, and importing
// it would couple continuum_rpc to process_rpc for nothing.
enum LogLevel {
  level_unspecified   = 0;
  trace               = 1;
  debug               = 2;
  info                = 3;
  warn                = 4;
  error               = 5;
}


message ListServicesRequest {
  string     workerUid  = 1;
}

message ListServicesResponse {
  repeated ServiceRecord  records = 1;
}

message ServiceRecord {
  string                uid              = 1;
  string                name             = 2;
  string                workerUid        = 3;
  bool                  workerEnabled   = 4;
  ServiceUnitJson       unitJson         = 5;
}

message PingRequest {
  string                uid              = 1;
  string                payload          = 2;
}

message ServiceUnitJson {
  SystemdServiceStatus  status           = 1;
  string                statusSource     = 2;
  bool                  unitExists       = 3;
  string                unitDescription  = 4;
  string                unitName         = 5;
}

enum SystemdServiceStatus {
  SystemdServiceStatus_Unspecified  = 0;
  SystemdServiceStatus_Stopped      = 1;
  SystemdServiceStatus_Running      = 2;
  SystemdServiceStatus_Failed       = 3;
  SystemdServiceStatus_Unknown      = 4;
}

message ResolveJobUidRequest {
  string     jobName      = 1;
  string     workerUid    = 2;
  string     kind         = 3;  // the job.kind to create if absent: "worker" (a8 worker run) or "supervisor" (service-manager/systemd). Empty -> supervisor.
}

message ResolveJobUidResponse {
  string     jobUid       = 1;
}

// AuthorizeForJob is the per-job authorization oracle. A server-side agent
// (e.g. the service-manager agent) calls this BEFORE performing a privileged action,
// passing the ORIGINAL operator's mailbox (read from its own verified rpcCtx)
// so continuum authorizes the operator — not the agent — against the job's
// ACL. continuum evaluates the SAME jobauth.Checker predicate used by
// scheduler.RunJobNow. Returns a binary allow/deny; the agent enforces.
message AuthorizeForJobRequest {
  string     callerMailbox = 1;  // the operator to authorize (NOT the RPC sender)
  string     jobUid        = 2;  // the job the action targets
  int32      requiredRank  = 3;  // jobauth rank (RankRun=2 for start/stop/restart)
}

message AuthorizeForJobResponse {
  bool       allowed       = 1;
  string     reason        = 2;  // human-readable denial reason when !allowed
}

message ArchivedNatsMessage {
  uint64                    sequence  = 1;  // stream sequence number
  google.protobuf.Timestamp timestamp = 2;  // message timestamp from NATS
  string                    subject   = 3;  // NATS subject
  bytes                     data      = 4;  // raw message payload
  map<string, string>       headers   = 5;  // NATS headers
}

