syntax = "proto3";

package checkpoint_rpc;
option go_package = "accur8.io/godev/pkg/rpc/checkpoint";
option java_package = "a8.hermes.proto.checkpoint";
option java_multiple_files = true;

// RunProgram asks the checkpoint mesh worker to run the checkpoint (.cp) program
// bound to event_kind, handing it the lifecycle happening as payload. This is the
// Go→checkpoint leg of the event-stream → checker pipeline: the checkpoint-runner
// (godev) consumes event.lifecycle.* and forwards each matched event here.
//
// payload_json is the lifecycle Envelope (eventUid, scheduleUid, eventKind,
// payload{schedule,event,processRun,disposition}) as JSON — self-contained so the
// .cp program needs no reload. The worker resolves event_kind → program; in
// Phase 3 it acknowledges receipt (real .cp healthchecks programs land in Phase 4).
message RunProgramRequest {
  string event_kind   = 1;  // e.g. "run.completed", "run.overdue"
  string schedule_uid = 2;  // convenience; also present inside payload_json
  string event_uid    = 3;  // convenience; correlates to the source happening
  bytes  payload_json = 4;  // the lifecycle Envelope, JSON-encoded
}

message RunProgramResponse {
  bool   accepted = 1;  // worker accepted the event for processing
  string message  = 2;  // human-readable detail (program bound, or why not)
  string program  = 3;  // the program/processor the kind resolved to (if any)
}
