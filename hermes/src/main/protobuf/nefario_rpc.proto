syntax = "proto3";

import "google/protobuf/timestamp.proto";

package nefario_rpc;
option java_package = "a8.hermes.proto.nefario";
option java_multiple_files = true;
option go_package = "accur8.io/godev/nefario/rpc";

message ProcessStartedRequest {
  string                        processUid          = 1;
  string                        parentProcessRunUid = 2;
	int32                         processPid          = 3;
  string                        minionUid           = 4;
  string                        serviceUid          = 5;
  google.protobuf.Timestamp     startedAt           = 6;  // UTC timestamp
	repeated string               command             = 7;
	string                        cwd                 = 8;
	repeated string               env                 = 9;
	string                        category            = 10;
  repeated string               channels            = 11;
  bool                          controllable        = 12;
  string                        launchError         = 13;
  string                        kind                = 14;
  string                        extraDataJsonStr    = 15;
  string                        serviceName         = 16;
  string                        ephemeralName       = 17;
  string                        eventUid            = 18;  // Scheduler event UID for correlation
}

message UpdateMailboxRequest {
  string        processUid     = 1;
  string        mailbox        = 2;
}

message ProcessPingRequest {
  repeated ProcessPing          pings      = 1;
  google.protobuf.Timestamp     timestamp  = 2;  // UTC timestamp
}

message ProcessPing {
  string               processUid    = 1;
  map<string, uint64>  channelSizes  = 2;
}

message ProcessCompletedRequest {
  string                        processUid     = 1;
  int32                         exitCode       = 2;
  string                        exitMessage    = 3;
  google.protobuf.Timestamp     completedAt    = 4;  // UTC timestamp
}

message Ack {
}

message MessageFromLaunchy {
  oneof message {
    ProcessStartedRequest     processStartedRequest      = 1;
    ProcessPingRequest        processPingRequest         = 2;
    ProcessCompletedRequest   processCompletedRequest    = 3;
    StreamWrite               streamWrite                = 4;
    UpdateMailboxRequest      updateMailboxRequest       = 5;
    PingRequest               pingRequest                = 6;
  }
}

message StreamWrite {
  string           processUid   = 1;
  string           channelName  = 2;
  StreamRecord     record       = 3;
}

message StreamRecord {
  google.protobuf.Timestamp     timestamp    = 2;  // UTC timestamp
  uint64                        sequence     = 3;
  repeated Buffer               buffers      = 4;
}

message Buffer {
  google.protobuf.Timestamp     timestamp  = 1;  // UTC timestamp
  bytes                         data       = 2;
  BufferSource                  source     = 3;
}

enum BufferSource {
  unspecified = 0;
  stderr      = 1;
  stdout      = 2;
  journalctl  = 3;
}


message ListServicesRequest {
  string     minionUid  = 1;
}

message ListServicesResponse {
  repeated ServiceRecord  records = 1;
}

message ServiceRecord {
  string                uid              = 1;
  string                name             = 2;
  string                minionUid        = 3;
  bool                  minionEnabled    = 4;
  ServiceUnitJson       unitJson         = 5;
}

message PingRequest {
  string                uid              = 1;
  string                payload          = 2;
}

message ServiceUnitJson {
  SystemdServiceStatus  status           = 1;
  string                statusSource     = 2;
  bool                  unitExists       = 3;
  string                unitDescription  = 4;
  string                unitName         = 5;
}

enum SystemdServiceStatus {
  SystemdServiceStatus_Unspecified  = 0;
  SystemdServiceStatus_Stopped      = 1;
  SystemdServiceStatus_Running      = 2;
  SystemdServiceStatus_Failed       = 3;
  SystemdServiceStatus_Unknown      = 4;
}

message ResolveServiceUidRequest {
  string     serviceName  = 1;
  string     minionUid    = 2;
}

message ResolveServiceUidResponse {
  string     serviceUid   = 1;
}

message InitMinionRequest {
  string     serverName    = 1;  // hostname of the server
  string     login         = 2;  // user login name
  string     serviceName   = 3;  // optional service name to register
}

message InitMinionResponse {
  string     minionUid     = 1;
  string     minionLabel   = 2;  // user@hostname format
  string     serverUid     = 3;
  string     serverLabel   = 4;  // hostname
}

message GetHealthchecksConfigRequest {
  // Empty for now, may add filtering in future
}

message GetHealthchecksConfigResponse {
  string     apiKey     = 1;
  string     baseUrl    = 2;  // e.g., "https://hc-ping.com"
  string     hermesUrl  = 3;  // e.g., "https://hermes.accur8.net"
}

message GetNixFlakeRequest {
  string     flakeRef   = 1;  // Can be name or uid
}

message GetNixFlakeResponse {
  string     uid            = 1;
  string     name           = 2;
  string     flakeDotNix    = 3;
  string     flakeDotLock   = 4;
  int64      changeSeq       = 5;
}

message CreateNixFlakeRequest {
  string     name           = 1;  // Flake name (must be unique)
  string     description    = 2;  // Optional description
  string     flakeDotNix    = 3;  // Content of flake.nix
  string     flakeDotLock   = 4;  // Content of flake.lock
  repeated string tags      = 5;  // Optional tags
  // Field 6 (createdBy) removed - now determined server-side from RPC context
}

message CreateNixFlakeResponse {
  string     uid            = 1;  // Generated flake UID
  string     name           = 2;  // Echo back name
  int64      changeSeq       = 3;  // Initial audit version
}

message UpdateNixFlakeRequest {
  string     uid            = 1;  // Flake UID to update
  string     flakeDotNix    = 2;  // New content of flake.nix
  string     flakeDotLock   = 3;  // New content of flake.lock
}

message UpdateNixFlakeResponse {
  bool       success        = 1;
  string     message        = 2;
  int64      changeSeq       = 3;  // New audit version after update
}

message ListNixFlakesRequest {
  // No parameters - list all flakes
}

message NixFlakeInfo {
  string     uid            = 1;
  string     name           = 2;
  string     description    = 3;
  int64      changeSeq       = 4;
  string     createdAt      = 5;  // RFC3339 format
  string     updatedAt      = 6;  // RFC3339 format
  string     createdBy      = 7;
  string     updatedBy      = 8;
}

message ListNixFlakesResponse {
  repeated NixFlakeInfo flakes = 1;
}

message PushMetricsRequest {
  string category = 1;
  string data = 2;  // JSON string
  string schedule_uid = 3;  // Optional, from $SCHEDULE_UID env var
  string process_run_uid = 4;  // Optional, from $PROCESS_RUN_UID env var
}

message PushMetricsResponse {
  bool success = 1;
  string message = 2;
  int64 id = 3;
}

